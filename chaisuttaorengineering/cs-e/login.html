<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CS.E</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <a href="/" class="nav-brand glow-text">_ CS.E</a>
            <div class="nav-links">
                <button id="theme-toggle" class="theme-toggle-btn">🌗</button>
            </div>
        </nav>

        <div class="form-container">
            <h2 class="glow-text" style="text-align:center; margin-bottom: 2rem;">Access the System</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" name="email" required placeholder="hacker@cse.in">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <!-- For MVP, if it doesn't exist, it auto registers -->
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">New here? Logging in will
                    auto-register your terminal.</p>
                <button type="submit" class="btn btn-highlight" style="width: 100%;">Initialize</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
